<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Preview Details</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-8">

            <!-- Preview card -->
            <div class="card shadow-lg border-0">

                <div class="card-header bg-warning text-dark py-3">
                    <h4 class="mb-0 fw-bold text-center">
                        Preview Your Information
                    </h4>
                </div>

                <div class="card-body p-4">

                    <!-- Short instruction -->
                    <p class="text-muted mb-4 text-center">
                        Please review your data before saving to the database.
                    </p>

                    <!-- Preview user details -->
                    <table class="table table-striped border">

                        <tr>
                            <th class="w-25 px-3">Full Name</th>
                            <td th:text="${user.name}"></td>
                        </tr>

                        <tr>
                            <th class="px-3">About</th>
                            <td th:text="${user.about}"></td>
                        </tr>

                        <tr>
                            <th class="px-3">Birthday</th>
                            <td th:text="${user.birthday}"></td>
                        </tr>

                        <tr>
                            <th class="px-3">Mobile</th>
                            <td th:text="${user.mobile}"></td>
                        </tr>

                        <tr>
                            <th class="px-3">Email</th>
                            <td th:text="${user.email}"></td>
                        </tr>

                        <tr>
                            <th class="px-3">Country</th>
                            <td th:text="${user.country}"></td>
                        </tr>

                    </table>

                    <!-- Final save form -->
                    <form id="confirmForm"
                          th:action="@{/save}"
                          th:object="${user}"
                          method="post">

                        <!-- Hidden fields to pass values again -->
                        <input type="hidden" th:field="*{id}">
                        <input type="hidden" th:field="*{name}">
                        <input type="hidden" th:field="*{about}">
                        <input type="hidden" th:field="*{birthday}">
                        <input type="hidden" th:field="*{mobile}">
                        <input type="hidden" th:field="*{email}">
                        <input type="hidden" th:field="*{country}">

                        <!-- Action buttons -->
                        <div class="d-flex justify-content-between mt-5">

                            <!-- Back for editing -->
                            <a href="javascript:history.back()"
                               class="btn btn-outline-secondary px-4">
                                Edit Again
                            </a>

                            <!-- Final confirmation -->
                            <button type="button"
                                    onclick="validateConfirmation()"
                                    class="btn btn-success px-5 fw-bold">
                                Confirm & Save
                            </button>

                        </div>

                    </form>

                </div>
            </div>

        </div>
    </div>
</div>

<script>
    // Show confirmation popup before final save
    function validateConfirmation() {

        const confirmed = confirm(
            "Are you sure you want to save this information?"
        );

        if (confirmed) {
            document.getElementById('confirmForm').submit();
        } else {
            console.log("Save action cancelled.");
        }
    }
</script>

</body>
</html>
