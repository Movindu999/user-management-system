<!-- index.html -->

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Internship Management System - Home</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        /* Card hover animation */
        .menu-card {
            transition: transform 0.3s;
            cursor: pointer;
        }

        .menu-card:hover {
            transform: translateY(-10px);
        }
    </style>
</head>

<body class="bg-secondary bg-opacity-10">

<!-- Top navigation bar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/">User Management System</a>
    </div>
</nav>

<!-- Main dashboard section -->
<div class="container mt-5">

    <!-- Page heading -->
    <div class="text-center mb-5">
        <h3 class="display-4 fw-bold">Main Dashboard</h3>
        <p class="text-secondary fw-semibold">
            User Registration and Management System
        </p>
    </div>

    <div class="row g-4 justify-content-center">

        <!-- Card 1 : User Registration -->
        <div class="col-md-5">
            <div class="card h-100 shadow-lg menu-card text-center border-0 rounded-4"
                 onclick="window.location.href='/register'">

                <div class="card-body py-5 px-4">

                    <!-- Registration icon -->
                    <div class="display-5 mb-3 text-primary">👤</div>

                    <h4 class="card-title fw-bold">
                        User Registration Portal
                    </h4>

                    <p class="card-text text-secondary small fw-semibold">
                        Enter and validate new user information securely
                    </p>

                    <!-- Open registration form -->
                    <a href="/register" class="btn btn-primary px-4 shadow-sm">
                        Open Portal
                    </a>

                </div>
            </div>
        </div>

        <!-- Card 2 : User List -->
        <div class="col-md-5">
            <div class="card h-100 shadow-lg menu-card text-center border-0 rounded-4"
                 onclick="window.location.href='/list'">

                <div class="card-body py-5 px-4">

                    <!-- Records icon -->
                    <div class="display-5 mb-3 text-primary">📊</div>

                    <h4 class="card-title fw-bold">
                        User Records Dashboard
                    </h4>

                    <p class="card-text text-secondary small fw-semibold">
                        View and manage all saved user records efficiently
                    </p>

                    <!-- Open user list -->
                    <a href="/list" class="btn btn-primary px-4 shadow-sm">
                        Manage Users
                    </a>

                </div>
            </div>
        </div>

    </div>
</div>

</body>
</html>
