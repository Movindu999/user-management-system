<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Registered User List</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<!-- Top navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
    <div class="container">

        <a class="navbar-brand" href="/">
            User Management System
        </a>

        <!-- Navigation links -->
        <div class="navbar-nav">
            <a class="nav-link" href="/">Home</a>
            <a class="nav-link" href="/register">Add User</a>
            <a class="nav-link active" href="/list">User List</a>
        </div>

    </div>
</nav>

<div class="container">

    <!-- Main card -->
    <div class="card shadow-sm border-0">

        <div class="card-header bg-white py-3 d-flex justify-content-between align-items-center">
            <h4 class="mb-0 fw-bold">
                Registered Users
            </h4>
        </div>

        <div class="card-body">

            <!-- Search box -->
            <form th:action="@{/list}"
                  method="get"
                  class="row g-3 mb-4">

                <!-- Search input -->
                <div class="col-md-8">
                    <input type="text"
                           name="keyword"
                           class="form-control"
                           placeholder="Search by Name, Email or Mobile"
                           th:value="${keyword}">
                </div>

                <!-- Search button -->
                <div class="col-md-2 d-grid">
                    <button type="submit"
                            class="btn btn-primary">
                        Search
                    </button>
                </div>

                <!-- Reset button -->
                <div class="col-md-2 d-grid">
                    <a th:href="@{/list}"
                       class="btn btn-secondary">
                        Reset
                    </a>
                </div>

            </form>

            <!-- User table -->
            <div class="table-responsive">

                <table class="table table-hover align-middle">

                    <thead class="table-light text-secondary text-uppercase small">
                    <tr>
                        <th>ID</th>
                        <th>Name</th>
                        <th>Email</th>
                        <th>Mobile</th>
                        <th>Country</th>
                        <th class="text-center">Edit Function</th>
                    </tr>
                    </thead>

                    <tbody>

                    <!-- Loop all users -->
                    <tr th:each="user : ${users}">

                        <td class="fw-bold"
                            th:text="${user.id}">
                        </td>

                        <td th:text="${user.name}"></td>
                        <td th:text="${user.email}"></td>
                        <td th:text="${user.mobile}"></td>
                        <td th:text="${user.country}"></td>

                        <!-- Update button -->
                        <td class="text-center">
                            <a th:href="@{/edit/{id}(id=${user.id})}"
                               class="btn btn-outline-warning btn-sm">
                                Update Record
                            </a>
                        </td>

                    </tr>

                    <!-- If no users found -->
                    <tr th:if="${#lists.isEmpty(users)}">
                        <td colspan="6"
                            class="text-center py-5 text-muted">
                            No user data found in database.
                        </td>
                    </tr>

                    </tbody>

                </table>

            </div>

        </div>
    </div>

</div>

</body>
</html>
