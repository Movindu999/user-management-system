<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>User Registration</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5 mb-5">
    <div class="row justify-content-center">
        <div class="col-md-8">

            <!-- Main form card -->
            <div class="card shadow">
                <div class="card-header bg-primary text-white py-3">

                    <!-- Dynamic title for register/update -->
                    <h4 class="mb-0 text-center"
                        th:text="${user.id != null} ? 'Update User' : 'Register New User'">
                        Form
                    </h4>
                </div>

                <div class="card-body p-4">

                    <!-- User form -->
                    <form th:action="@{/preview}" th:object="${user}" method="post">

                        <!-- Hidden ID for update -->
                        <input type="hidden" th:field="*{id}">

                        <!-- Full Name -->
                        <div class="mb-3">
                            <label class="form-label fw-bold">Full Name</label>
                            <input type="text"
                                   class="form-control"
                                   th:field="*{name}"
                                   placeholder="Enter name">

                            <!-- Validation error -->
                            <div class="text-danger small"
                                 th:if="${#fields.hasErrors('name')}"
                                 th:errors="*{name}">
                            </div>
                        </div>

                        <!-- About -->
                        <div class="mb-3">
                            <label class="form-label fw-bold">About</label>
                            <textarea class="form-control"
                                      th:field="*{about}"
                                      rows="3"></textarea>

                            <div class="text-danger small"
                                 th:if="${#fields.hasErrors('about')}"
                                 th:errors="*{about}">
                            </div>
                        </div>

                        <!-- Birthday + Mobile -->
                        <div class="row mb-3">

                            <div class="col-md-6">
                                <label class="form-label fw-bold">Birthday</label>
                                <input type="date"
                                       class="form-control"
                                       th:field="*{birthday}"
                                       th:max="${#temporals.format(#temporals.createNow(), 'yyyy-MM-dd')}"> <div class="text-danger small"
                                                                                                                 th:if="${#fields.hasErrors('birthday')}"
                                                                                                                 th:errors="*{birthday}">
                            </div>
                            </div>

                            <div class="col-md-6">
                                <label class="form-label fw-bold">Mobile</label>
                                <input type="text"
                                       class="form-control"
                                       th:field="*{mobile}">

                                <div class="text-danger small"
                                     th:if="${#fields.hasErrors('mobile')}"
                                     th:errors="*{mobile}">
                                </div>
                            </div>

                        </div>

                        <!-- Email + Country -->
                        <div class="row mb-3">

                            <div class="col-md-6">
                                <label class="form-label fw-bold">Email</label>
                                <input type="email"
                                       class="form-control"
                                       th:field="*{email}">

                                <div class="text-danger small"
                                     th:if="${#fields.hasErrors('email')}"
                                     th:errors="*{email}">
                                </div>
                            </div>

                            <div class="col-md-6">
                                <label class="form-label fw-bold">Country</label>
                                <input type="text"
                                       class="form-control"
                                       th:field="*{country}">

                                <div class="text-danger small"
                                     th:if="${#fields.hasErrors('country')}"
                                     th:errors="*{country}">
                                </div>
                            </div>

                        </div>

                        <!-- Buttons -->
                        <div class="d-flex justify-content-between mt-4">

                            <!-- Save details -->
                            <button type="submit" class="btn btn-success px-4">
                                Save Details
                            </button>

                            <!-- Back to home -->
                            <a th:href="@{/}" class="btn btn-outline-secondary">
                                Back to Home
                            </a>

                        </div>

                    </form>

                </div>
            </div>

        </div>
    </div>
</div>

</body>
</html>
